defaults:
  redis_version: "8.2"
  public_endpoint_access: true
  enable_tls: true
  enable_default_user: false
  auto_minor_version_upgrade: true
  throughput_measurement_by: operations-per-second
  support_oss_cluster_api: false
  external_endpoint_for_oss_cluster_api: false
  tags:
    managed_by: terraform
    organization: frontline-education
  maintenance_windows:
    mode: manual
    window:
      start_hour: 2
      duration_in_hours: 4
      days:
        - Sunday
  database_alert_settings:
    dataset_size_pct: 80
    throughput_high_ratio_warning: 0.7
    throughput_high_ratio_critical: 0.9
    latency_ms_warning: 10
    latency_ms_critical: 20
    # Replica Of thresholds are stored here for future use. The current
    # repository baseline provisions standalone Redis Cloud databases with HA,
    # not Replica Of target databases.
    replica_unable_to_sync_timeout_sec: 1
    replica_lag_sec_warning: 60
    replica_lag_sec_critical: 120

secret_settings:
  prefix: frontline-education/redis
  recovery_window_in_days: 0

billing:
  payment_method: credit-card
  credit_card_type: Mastercard
  credit_card_last_four: "1006"

subscription_settings:
  deployment_model: managed

environments:
  dev:
    aws_region: us-east-1
    region: us-east-1
    cloud_account_name: frontline-dev
    networking_deployment_cidr: 10.10.0.0/24
    multiple_availability_zones: false
    preferred_availability_zones: []
  qa:
    aws_region: us-east-1
    region: us-east-1
    cloud_account_name: frontline-qa
    networking_deployment_cidr: 10.20.0.0/24
    multiple_availability_zones: false
    preferred_availability_zones: []
  stage:
    aws_region: us-east-1
    region: us-east-1
    cloud_account_name: frontline-stage
    networking_deployment_cidr: 10.30.0.0/24
    multiple_availability_zones: true
    preferred_availability_zones:
      - use1-az1
      - use1-az2
      - use1-az4
  prod:
    aws_region: us-east-1
    region: us-east-1
    cloud_account_name: frontline-prod
    networking_deployment_cidr: 10.40.0.0/24
    multiple_availability_zones: true
    preferred_availability_zones:
      - use1-az1
      - use1-az2
      - use1-az4

subscription_profiles:
  shared:
    description: Shared platform slice that may host multiple workloads and should keep the largest default envelope.
    max_tier: xl
    memory_storage: ram
    replication: true
    support_oss_cluster_api: false
    modules: []
  student-solutions:
    description: Student-facing workloads that benefit from a larger shared subscription envelope, but not the largest one by default.
    max_tier: l
    memory_storage: ram
    replication: true
    support_oss_cluster_api: false
    modules: []
  business-systems:
    description: Back-office and business workloads with similar baseline envelope needs to student solutions.
    max_tier: l
    memory_storage: ram
    replication: true
    support_oss_cluster_api: false
    modules: []

database_sizes:
  s:
    description: Small cache, small session store, or internal service with modest concurrency.
    dataset_size_in_gb: 1
    throughput_measurement_by: operations-per-second
    throughput_measurement_value: 5000
    replication: true
  m:
    description: Medium application cache or session workload with steady traffic.
    dataset_size_in_gb: 5
    throughput_measurement_by: operations-per-second
    throughput_measurement_value: 15000
    replication: true
  l:
    description: Critical workload with higher concurrency, burst tolerance, or heavier persistence overhead.
    dataset_size_in_gb: 15
    throughput_measurement_by: operations-per-second
    throughput_measurement_value: 40000
    replication: true
  xl:
    description: Large shared workload or high-demand service that needs substantial headroom.
    dataset_size_in_gb: 30
    throughput_measurement_by: operations-per-second
    throughput_measurement_value: 80000
    replication: true
